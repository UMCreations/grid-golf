name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: tools/level-editor-web/package-lock.json

      - name: Install editor dependencies
        working-directory: tools/level-editor-web
        run: npm ci

      - name: Build editor
        working-directory: tools/level-editor-web
        run: npm run build

      - name: Prepare Pages artifact
        run: |
          rm -rf site
          mkdir -p site/editor
          mkdir -p site/game
          cp -R tools/level-editor-web/dist/. site/editor/
          cp -R PuzzleGolf/Builds/WebGL/. site/game/
          cp web-build/index.html site/index.html
          touch site/.nojekyll

      - name: Verify game build exists
        run: test -f site/game/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
