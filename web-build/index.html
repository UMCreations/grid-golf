<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PuzzleGolf</title>
    <style>
      body {
        margin: 0;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #f8f1e2 0%, #edf5ea 100%);
        color: #173125;
      }
      main {
        max-width: 960px;
        margin: 0 auto;
        padding: 48px 24px;
      }
      .card {
        background: rgba(255, 255, 255, 0.85);
        border: 1px solid rgba(23, 49, 37, 0.1);
        border-radius: 24px;
        padding: 28px;
      }
      h1 { margin: 0 0 8px; font-size: 3rem; }
      p { color: #4f6354; }
      .actions {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
        margin-top: 20px;
      }
      a {
        display: inline-flex;
        padding: 12px 18px;
        border-radius: 999px;
        background: #28493a;
        color: white;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>PuzzleGolf</h1>
        <p>Open the Unity WebGL game or the team level editor.</p>
        <div class="actions">
          <a href="./game/">Play Game</a>
          <a href="./editor/">Open Level Editor</a>
        </div>
      </section>
    </main>
  </body>
  </html>
